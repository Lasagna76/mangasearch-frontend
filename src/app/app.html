<mat-toolbar>
  <span class="logo">MangaSearch</span>
  <span class="spacer"></span>

  @if (isMobile()) {
  <button class="menu-trigger" mat-icon-button [matMenuTriggerFor]="menu" aria-label="Menu">
    <mat-icon>menu</mat-icon>
  </button>

  <mat-menu #menu="matMenu">
    <button mat-menu-item routerLink="/">
      <mat-icon>home</mat-icon>
      Home
    </button>
    <button mat-menu-item routerLink="/search">
      <mat-icon>search</mat-icon>
      Search Completed Manga
    </button>
    <button mat-menu-item (click)="openReportDialog()">
      <mat-icon>flag</mat-icon>
      Report an issue
    </button>
  </mat-menu>
  } @else {
  <button class="buttonSearch" matButton routerLink="/">Home</button>
  <button class="buttonSearch" matButton routerLink="/search">Search Completed Manga</button>
  <button class="buttonSearch" matButton (click)="openReportDialog()">
    <mat-icon>flag</mat-icon>
    Report an issue
  </button>
  }
</mat-toolbar>

<router-outlet></router-outlet>
